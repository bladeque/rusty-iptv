name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run core tests
        run: cargo test -p rusty-iptv-core --verbose

  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk rusty-iptv-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: rusty-iptv-debug.apk
      - name: Publish rolling latest release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: rusty-iptv-debug.apk
          body: |
            Auto-updated on every push to main.

            **Install on FireStick:**
            1. Open the Downloader app
            2. Enter this URL:
               `https://github.com/bladeque/rusty-iptv/releases/latest/download/rusty-iptv-debug.apk`
            3. Install and launch rusty-iptv
